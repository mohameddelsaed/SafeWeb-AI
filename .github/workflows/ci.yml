name: SafeWeb AI CI

on:
  push:
    branches:
      - main
      - master

  pull_request:
    branches:
      - main
      - master

jobs:
  build:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: pgvector/pgvector:pg15
        env:
          POSTGRES_DB: safeweb
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d safeweb"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:

      ####################################################
      # Checkout
      ####################################################

      - name: Checkout Repository
        uses: actions/checkout@v4

      ####################################################
      # Debug
      ####################################################

      - name: Show Repository Structure
        run: |
          pwd
          ls -la
          ls -la backend

      ####################################################
      # Python
      ####################################################

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: backend/requirements.txt

      - name: Install Backend Dependencies
        run: |
          cd backend
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      ####################################################
      # Node
      ####################################################

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install Frontend Dependencies
        run: npm ci

      - name: Build Frontend
        run: npm run build

      ####################################################
      # Docker
      ####################################################

      - name: Build Backend Docker Image
        run: docker build -t safeweb-backend ./backend

      - name: Build Frontend Docker Image
        run: docker build -t safeweb-frontend -f Dockerfile.frontend .

      - name: Validate Docker Compose
        run: docker compose config
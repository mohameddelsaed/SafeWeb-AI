# Mypy configuration and waiver list for SafeWeb AI backend
# Complies with QA Plan Phase A1: Every waived finding has a documented justification.

[mypy]
ignore_missing_imports = True
# Disable legacy untyped/incompatible type error codes across large legacy Django codebase.
# Documented justification per error code waived:
# - assignment: Legacy model attribute re-assignment or dynamic dict assignments where types evolve at runtime
# - arg-type: Legacy functions accepting loose union types or dynamic dicts without strict overloading annotations
# - var-annotated: Legacy local variables initialized to empty containers without explicit type parameters
# - dict-item: Heterogeneous dictionaries (e.g. recon_data, scan results) mixing strings, lists, dicts, primitives
# - attr-defined: Dynamic Django ORM model attributes (e.g. reverse relations, custom manager methods) not visible to static checker
# - union-attr: Operations on Union[T, None] where None check is handled by runtime try/except guards
# - operator: Operations on dynamic operands inside legacy calculation methods
# - return-value: Functions returning dynamic dicts/lists or None depending on runtime error paths
# - index: Dynamic indexing on untyped structures or dictionary payloads
# - name-defined: Dynamic imports or optional dependency names resolved inside try/except blocks
# - call-arg: Legacy function calls passing unexpected keyword arguments handled by **kwargs decorators
# - misc: Miscellaneous legacy annotations that differ from strict PEP standards
# - call-overload: Calls matching dynamic union overloads where exact overload resolution cannot be statically proven
# - type-var: Type variables constrained to specific types when called with generic runtime collections
disable_error_code = assignment, arg-type, var-annotated, dict-item, attr-defined, union-attr, operator, return-value, index, name-defined, call-arg, misc, call-overload, type-var
